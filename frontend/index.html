<!DOCTYPE html>
<html>
<head>
    <title>Student Project Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Student Project Review Board</h1>

<form id="projectForm">
    <input type="text" id="title" placeholder="Project Title" required>
    <input type="text" id="student" placeholder="Student Name" required>
    <textarea id="description" placeholder="Project Description"></textarea>
    <button type="submit">Add Project</button>
</form>

<div id="projectList"></div>

<script src="script.js"></script>
</body>
</html>
